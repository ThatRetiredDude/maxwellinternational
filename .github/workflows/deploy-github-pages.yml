# Publishes `dist/` to the `gh-pages` branch (static files only).
#
# One-time (required): Repo → Settings → Pages → Build and deployment
#   Source: Deploy from a branch
#   Branch: gh-pages  /  Folder: / (root)
# Site URL: https://thatretireddude.github.io/maxwellinternational/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Push dist to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
